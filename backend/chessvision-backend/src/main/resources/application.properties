spring.application.name=chessvision-backend
server.port=${PORT:8080}

# Supabase PostgreSQL
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase Auth verification
supabase.url=${SUPABASE_URL}
supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY}

# Tabelite vekje postojat vo Supabase, Spring ne gi kreira sam.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Stockfish
stockfish.path=${STOCKFISH_PATH:stockfish/stockfish.exe}
stockfish.depth=12
stockfish.threads=1
stockfish.hash-mb=64